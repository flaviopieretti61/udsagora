name: Supabase Keep Alive

on:
  schedule:
    # Esegue il job ogni lunedì e giovedì alle 12:00 UTC (due volte a settimana per sicurezza)
    - cron: '0 12 * * 1,4'
  workflow_dispatch: # Permette di avviare il job manualmente dalla scheda "Actions"

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database via REST API
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/Course?limit=2" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
